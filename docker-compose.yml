services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: fetchmux:founding
    init: true
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      FETCHMUX_HOST: 0.0.0.0
      FETCHMUX_PORT: 8787
    ports:
      - "127.0.0.1:8787:8787"
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 10s
