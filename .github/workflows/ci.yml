name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json
          package-manager-cache: false

      - name: Install locked dependencies
        run: npm ci --ignore-scripts

      - name: Run tests
        run: npm test

      - name: Type-check
        run: npm run typecheck

      - name: Lint and format check
        run: npm run lint

      - name: Build production artifacts
        run: npm run build

      - name: Validate benchmark matrix without network calls
        run: npm run benchmark -- --workload benchmarks/workloads/founding-v1.json --mode dry-run

      - name: Build container image
        run: docker build --tag fetchmux:ci .
