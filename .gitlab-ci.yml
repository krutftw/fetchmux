include:
  - template: Jobs/SAST.gitlab-ci.yml
  - template: Jobs/Secret-Detection.gitlab-ci.yml
  - template: Jobs/Dependency-Scanning.v2.gitlab-ci.yml
  - template: Jobs/Container-Scanning.gitlab-ci.yml

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      variables:
        AST_ENABLE_MR_PIPELINES: "false"
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - when: never

stages:
  - build
  - test
  - security

variables:
  AST_ENABLE_MR_PIPELINES: "true"
  FETCHMUX_EXPECT_ULTIMATE_SECURITY: "true"
  GITLAB_ADVANCED_SAST_ENABLED: "true"
  DS_MAX_DEPTH: "1"

.project_pipeline_rules:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

verify:
  extends: .project_pipeline_rules
  image: node:24.18.0-bookworm-slim@sha256:6f7b03f7c2c8e2e784dcf9295400527b9b1270fd37b7e9a7285cf83b6951452d
  stage: build
  interruptible: true
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
  variables:
    npm_config_cache: "$CI_PROJECT_DIR/.npm"
    npm_config_audit: "false"
    npm_config_fund: "false"
  script:
    - npm ci --ignore-scripts
    - npm audit --audit-level=high
    - npm test -- --reporter=default --reporter=junit --outputFile.junit=output/ci/junit.xml
    - npm run typecheck
    - npm run lint
    - npm run lint:openapi
    - npm run build
    - npm run benchmark -- --workload benchmarks/workloads/founding-v1.json --mode dry-run
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - scripts/ci/security-gate.mjs
    reports:
      junit: output/ci/junit.xml

build_container:
  extends: .project_pipeline_rules
  image: docker@sha256:862099ada15c669000bef53aa4cb9d821262829f45b0dda2159ccb276443043b
  stage: build
  interruptible: true
  services:
    - name: docker@sha256:66d292e5c26bd33a6f6f61cacb880de2186339a524ecba1ce098dbbaceed6515
      alias: docker
      command:
        - --tls=false
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_BUILDKIT: "1"
    BUILDKIT_PROGRESS: plain
  before_script:
    - docker info
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" --username "$CI_REGISTRY_USER" --password-stdin
  script:
    - export FETCHMUX_IMAGE="$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"
    - docker build --pull --tag "$FETCHMUX_IMAGE" .
    - docker push "$FETCHMUX_IMAGE"
  after_script:
    - docker logout "$CI_REGISTRY"

secret_detection:
  variables:
    SECRET_DETECTION_HISTORIC_SCAN: "true"

gitlab-advanced-sast:
  after_script:
    - if [ -f gl-sast-report.json ]; then cp gl-sast-report.json gl-sast-advanced-report.json; fi
  variables:
    AFTER_SCRIPT_IGNORE_ERRORS: "false"
  artifacts:
    when: always
    paths:
      - gl-sast-report.json
      - gl-sast-advanced-report.json
      - ts-cache.sqlite.gz

semgrep-sast:
  after_script:
    - if [ -f gl-sast-report.json ]; then cp gl-sast-report.json gl-sast-semgrep-report.json; fi
  variables:
    AFTER_SCRIPT_IGNORE_ERRORS: "false"
  artifacts:
    when: always
    paths:
      - gl-sast-report.json
      - gl-sast-semgrep-report.json

container_scanning:
  extends: .project_pipeline_rules
  needs:
    - build_container
  variables:
    CS_IMAGE: "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"
    CS_DOCKERFILE_PATH: Dockerfile
    GIT_STRATEGY: fetch
    CS_DISABLE_LANGUAGE_VULNERABILITY_SCAN: "false"
    CS_INCLUDE_LICENSES: "true"
    CS_REPORT_OS_EOL: "true"

security_gate:
  extends: .project_pipeline_rules
  image: node:24.18.0-bookworm-slim@sha256:6f7b03f7c2c8e2e784dcf9295400527b9b1270fd37b7e9a7285cf83b6951452d
  stage: security
  interruptible: true
  variables:
    GIT_STRATEGY: none
  needs:
    - job: verify
      artifacts: true
    - job: gitlab-advanced-sast
      artifacts: true
      optional: true
    - job: semgrep-sast
      artifacts: true
      optional: true
    - job: secret_detection
      artifacts: true
    - job: dependency-scanning
      artifacts: true
      optional: true
    - job: container_scanning
      artifacts: true
  script:
    - node scripts/ci/security-gate.mjs
